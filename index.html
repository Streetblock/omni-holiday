<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Feiertags- & Fastenkalender</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
</head>
<body class="text-gray-800 min-h-screen pb-12">

    <div class="bg-gradient-to-r from-indigo-600 via-blue-600 to-blue-500 text-white pb-32 pt-14 px-4 shadow-xl">
        <div class="container mx-auto max-w-4xl text-center">
            <h1 class="text-3xl md:text-5xl font-bold tracking-tight mb-3 drop-shadow-sm">Universal Kalender</h1>
            <p class="text-indigo-100 text-lg opacity-90 font-medium">Feiertage, Fastenzeiten & Brauchtum entdecken</p>
        </div>
    </div>

    <div class="container mx-auto p-4 md:p-8 max-w-4xl -mt-24">

        <div class="bg-white rounded-2xl shadow-xl border border-gray-100 p-6 md:p-8 mb-8">

            <div class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4">
                <div class="text-center sm:text-left">
                    <h2 class="text-lg font-bold text-gray-800">Filter & Einstellungen</h2>
                    <p class="text-sm text-gray-500">Wählen Sie das Jahr und Kategorien</p>
                </div>

                <div class="relative w-full sm:w-auto">
                    <select id="year-select" class="appearance-none bg-gray-50 border border-gray-200 text-gray-900 text-lg font-semibold rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 block w-full pl-5 pr-12 py-3 shadow-sm transition-all hover:border-indigo-300 cursor-pointer">
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                        </svg>
                    </div>
                </div>
            </div>

            <hr class="border-gray-100 mb-6">

            <div class="flex flex-wrap gap-2 md:gap-3 justify-center sm:justify-start">

                <label class="cursor-pointer group relative">
                    <input type="checkbox" id="filter-legal" class="peer sr-only" checked>
                    <div class="px-4 py-2.5 rounded-full border border-gray-200 bg-white text-gray-600 text-sm font-semibold transition-all duration-200 ease-in-out hover:bg-gray-50 peer-checked:bg-indigo-50 peer-checked:text-indigo-700 peer-checked:border-indigo-200 peer-checked:shadow-md peer-focus:ring-2 peer-focus:ring-indigo-500 peer-focus:ring-offset-2 select-none flex items-center">
                        <span class="w-2.5 h-2.5 rounded-full bg-gray-300 mr-2.5 transition-colors peer-checked:bg-indigo-600 group-hover:bg-gray-400"></span>
                        Gesetzlich
                    </div>
                </label>

                <label class="cursor-pointer group relative">
                    <input type="checkbox" id="filter-catholic" class="peer sr-only">
                    <div class="px-4 py-2.5 rounded-full border border-gray-200 bg-white text-gray-600 text-sm font-semibold transition-all duration-200 ease-in-out hover:bg-gray-50 peer-checked:bg-blue-50 peer-checked:text-blue-700 peer-checked:border-blue-200 peer-checked:shadow-md peer-focus:ring-2 peer-focus:ring-blue-500 peer-focus:ring-offset-2 select-none flex items-center">
                        <span class="w-2.5 h-2.5 rounded-full bg-gray-300 mr-2.5 transition-colors peer-checked:bg-blue-600 group-hover:bg-gray-400"></span>
                        Katholisch
                    </div>
                </label>

                <label class="cursor-pointer group relative">
                    <input type="checkbox" id="filter-protestant" class="peer sr-only">
                    <div class="px-4 py-2.5 rounded-full border border-gray-200 bg-white text-gray-600 text-sm font-semibold transition-all duration-200 ease-in-out hover:bg-gray-50 peer-checked:bg-blue-50 peer-checked:text-blue-700 peer-checked:border-blue-200 peer-checked:shadow-md peer-focus:ring-2 peer-focus:ring-blue-500 peer-focus:ring-offset-2 select-none flex items-center">
                        <span class="w-2.5 h-2.5 rounded-full bg-gray-300 mr-2.5 transition-colors peer-checked:bg-blue-600 group-hover:bg-gray-400"></span>
                        Evangelisch
                    </div>
                </label>

                <label class="cursor-pointer group relative">
                    <input type="checkbox" id="filter-orthodox" class="peer sr-only">
                    <div class="px-4 py-2.5 rounded-full border border-gray-200 bg-white text-gray-600 text-sm font-semibold transition-all duration-200 ease-in-out hover:bg-gray-50 peer-checked:bg-cyan-50 peer-checked:text-cyan-700 peer-checked:border-cyan-200 peer-checked:shadow-md peer-focus:ring-2 peer-focus:ring-cyan-500 peer-focus:ring-offset-2 select-none flex items-center">
                        <span class="w-2.5 h-2.5 rounded-full bg-gray-300 mr-2.5 transition-colors peer-checked:bg-cyan-600 group-hover:bg-gray-400"></span>
                        Orthodox
                    </div>
                </label>

                <label class="cursor-pointer group relative">
                    <input type="checkbox" id="filter-jewish" class="peer sr-only">
                    <div class="px-4 py-2.5 rounded-full border border-gray-200 bg-white text-gray-600 text-sm font-semibold transition-all duration-200 ease-in-out hover:bg-gray-50 peer-checked:bg-purple-50 peer-checked:text-purple-700 peer-checked:border-purple-200 peer-checked:shadow-md peer-focus:ring-2 peer-focus:ring-purple-500 peer-focus:ring-offset-2 select-none flex items-center">
                        <span class="w-2.5 h-2.5 rounded-full bg-gray-300 mr-2.5 transition-colors peer-checked:bg-purple-600 group-hover:bg-gray-400"></span>
                        Jüdisch
                    </div>
                </label>

                <label class="cursor-pointer group relative">
                    <input type="checkbox" id="filter-islamic" class="peer sr-only">
                    <div class="px-4 py-2.5 rounded-full border border-gray-200 bg-white text-gray-600 text-sm font-semibold transition-all duration-200 ease-in-out hover:bg-gray-50 peer-checked:bg-emerald-50 peer-checked:text-emerald-700 peer-checked:border-emerald-200 peer-checked:shadow-md peer-focus:ring-2 peer-focus:ring-emerald-500 peer-focus:ring-offset-2 select-none flex items-center">
                        <span class="w-2.5 h-2.5 rounded-full bg-gray-300 mr-2.5 transition-colors peer-checked:bg-emerald-600 group-hover:bg-gray-400"></span>
                        Islamisch
                    </div>
                </label>

                <label class="cursor-pointer group relative">
                    <input type="checkbox" id="filter-iranian" class="peer sr-only">
                    <div class="px-4 py-2.5 rounded-full border border-gray-200 bg-white text-gray-600 text-sm font-semibold transition-all duration-200 ease-in-out hover:bg-gray-50 peer-checked:bg-amber-50 peer-checked:text-amber-700 peer-checked:border-amber-200 peer-checked:shadow-md peer-focus:ring-2 peer-focus:ring-amber-500 peer-focus:ring-offset-2 select-none flex items-center">
                        <span class="w-2.5 h-2.5 rounded-full bg-gray-300 mr-2.5 transition-colors peer-checked:bg-amber-600 group-hover:bg-gray-400"></span>
                        Iranisch
                    </div>
                </label>

                <label class="cursor-pointer group relative">
                    <input type="checkbox" id="filter-cultural" class="peer sr-only">
                    <div class="px-4 py-2.5 rounded-full border border-gray-200 bg-white text-gray-600 text-sm font-semibold transition-all duration-200 ease-in-out hover:bg-gray-50 peer-checked:bg-pink-50 peer-checked:text-pink-700 peer-checked:border-pink-200 peer-checked:shadow-md peer-focus:ring-2 peer-focus:ring-pink-500 peer-focus:ring-offset-2 select-none flex items-center">
                        <span class="w-2.5 h-2.5 rounded-full bg-gray-300 mr-2.5 transition-colors peer-checked:bg-pink-600 group-hover:bg-gray-400"></span>
                        Kultur
                    </div>
                </label>

                <div class="h-8 w-px bg-gray-200 mx-2 hidden md:block"></div>

                <label class="cursor-pointer group relative">
                    <input type="checkbox" id="filter-minor-fasting" class="peer sr-only">
                    <div class="px-3 py-2.5 rounded-lg border border-dashed border-gray-300 bg-transparent text-gray-500 text-xs font-semibold uppercase tracking-wide transition-all duration-200 ease-in-out hover:bg-gray-50 hover:text-gray-700 peer-checked:bg-red-50 peer-checked:text-red-700 peer-checked:border-red-200 peer-checked:border-solid peer-checked:shadow-sm select-none flex items-center">
                        <svg class="w-3.5 h-3.5 mr-1.5 opacity-50 peer-checked:opacity-100" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        + Kleine Fastentage
                    </div>
                </label>
            </div>
        </div>

        <div id="holidays-container" class="space-y-4"></div>

        <div id="empty-state" class="hidden text-center py-16 bg-white rounded-2xl shadow-sm border border-gray-100 fade-in">
            <div class="inline-block p-4 rounded-full bg-gray-50 mb-3">
                <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            </div>
            <p class="text-gray-500 font-medium">Keine Tage für diese Auswahl gefunden.</p>
            <p class="text-sm text-gray-400 mt-1">Aktivieren Sie weitere Filter oben.</p>
        </div>

        <div id="footnotes" class="mt-8 p-6 bg-blue-50/50 rounded-xl border border-blue-100/50 hidden text-sm text-gray-600 fade-in"></div>
    </div>

        <script type="module" src="libs/bootstrap.js"></script>

        <script src="app.js"></script>
</body>
</html>
